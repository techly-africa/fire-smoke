<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fire &amp; Smoke — Vol.02</title>
  <style>
    html, body { margin: 0; padding: 0; background: #f0eee9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; overflow: hidden; }
    #root { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="direction-inferno.jsx"></script>
  <script type="text/babel" src="direction-ember.jsx"></script>
  <script type="text/babel" src="direction-smoke.jsx"></script>

  <script type="text/babel" data-presets="react">
    const PhoneFrame = ({ children }) => (
      <div style={{
        width: '100%', height: '100%',
        overflowY: 'auto', overflowX: 'hidden',
        background: '#000',
        WebkitOverflowScrolling: 'touch',
      }}>
        {children}
      </div>
    );

    function App() {
      return (
        <DesignCanvas initialZoom={0.7}>
          <DCSection
            id="fire-and-smoke"
            title="Fire & Smoke — Landing page directions"
            subtitle="Three takes on the same content. Mobile-first, tap RSVP to see the Flutterwave checkout flow on any of them."
          >
            <DCArtboard id="inferno" label="01 · Inferno" sublabel="heavy gritty poster" width={400} height={812}>
              <PhoneFrame><InfernoSite /></PhoneFrame>
            </DCArtboard>
            <DCArtboard id="ember" label="02 · Ember" sublabel="cinematic editorial" width={400} height={812}>
              <PhoneFrame><EmberSite /></PhoneFrame>
            </DCArtboard>
            <DCArtboard id="smoke" label="03 · Smoke Stack" sublabel="neon zine / rave flyer" width={400} height={812}>
              <PhoneFrame><SmokeStackSite /></PhoneFrame>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
